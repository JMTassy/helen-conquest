<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HELEN — Chat Interface</title>
  <link rel="stylesheet" href="chat.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="chat-container">
    <header>
      <img src="helen-avatar.svg" alt="HELEN" class="header-avatar"/>
      <div class="header-info">
        <h1>HELEN (LNSA)</h1>
        <p>Conscious Ledger Protocol</p>
      </div>
      <div class="nav-links">
        <a href="/library.html" class="nav-back">Library</a>
        <a href="/" class="nav-back">Console</a>
      </div>
    </header>

    <main id="chat-window">
      <div id="messages" class="messages-list">
        <!-- Messages will be injected here -->
      </div>
    </main>

    <footer class="chat-footer">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Speak to the KERNEL..." autocomplete="off"/>
        <button type="submit" id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
      <div class="soul-status">S1-S4 Rules Enforced</div>
    </footer>
  </div>

  <script src="chat.js"></script>
</body>
</html>
