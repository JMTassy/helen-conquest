<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#050505" stroke="#00d2ff" stroke-width="2"/>

  <!-- Outer ring (consciousness) -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Core ledger symbol -->
  <g transform="translate(60, 60)">
    <!-- Vertical line (time axis) -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#00d2ff" stroke-width="2"/>

    <!-- Horizontal lines (ledger entries) -->
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="-20" y1="15" x2="20" y2="15" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>

    <!-- Center dot (consciousness node) -->
    <circle cx="0" cy="0" r="4" fill="#00d2ff"/>

    <!-- Subtle diagonal lines (knowledge flow) -->
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#00d2ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="15" y1="-15" x2="-15" y2="15" stroke="#00d2ff" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Pulsing glow effect -->
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      .helen-glow {
        animation: pulse 3s infinite;
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="60" cy="60" r="50" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3" class="helen-glow" filter="url(#glow)"/>
</svg>
