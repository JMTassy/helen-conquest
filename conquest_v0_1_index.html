<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONQUEST — The Castle Remembers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            color: #c9a961;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #1a1a2e;
            border: 2px solid #c9a961;
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(201, 169, 97, 0.2);
        }

        .castle {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #8b7355;
            margin-bottom: 30px;
            font-style: italic;
        }

        .state {
            background: #0f1419;
            border: 1px solid #c9a961;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 2px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .state-label {
            font-size: 12px;
            color: #8b7355;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .state-text {
            font-size: 16px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #c9a961;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            background: #0f1419;
            border: 1px solid #c9a961;
            color: #c9a961;
            font-family: 'Georgia', serif;
            font-size: 14px;
            border-radius: 2px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(201, 169, 97, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #c9a961;
            color: #1a1a2e;
            border: none;
            font-family: 'Georgia', serif;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        button:hover {
            background: #d4b578;
            box-shadow: 0 0 15px rgba(201, 169, 97, 0.4);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .button-secondary {
            background: transparent;
            border: 1px solid #c9a961;
            color: #c9a961;
        }

        .button-secondary:hover {
            background: rgba(201, 169, 97, 0.1);
        }

        .ledger {
            background: #0f1419;
            border: 1px solid #c9a961;
            padding: 15px;
            margin-top: 20px;
            border-radius: 2px;
            max-height: 200px;
            overflow-y: auto;
        }

        .ledger-entry {
            font-size: 12px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
            color: #999;
        }

        .ledger-entry:last-child {
            border-bottom: none;
        }

        .ledger-action {
            color: #c9a961;
            font-weight: bold;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 2px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.success {
            background: rgba(169, 201, 97, 0.1);
            border: 1px solid #a9c961;
            color: #a9c961;
        }

        .message.error {
            background: rgba(220, 97, 97, 0.1);
            border: 1px solid #dc6161;
            color: #dc6161;
        }

        .message.info {
            background: rgba(201, 169, 97, 0.1);
            border: 1px solid #c9a961;
            color: #c9a961;
        }

        .phase {
            opacity: 0.5;
        }

        .phase.active {
            opacity: 1;
        }

        .separator {
            height: 1px;
            background: #c9a961;
            opacity: 0.2;
            margin: 30px 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="castle">⬛</div>
        <h1>CONQUEST</h1>
        <p class="subtitle">The Castle Remembers</p>

        <div id="message-container"></div>

        <!-- PHASE 1: ENTRY -->
        <div id="phase-entry" class="phase active">
            <div class="state">
                <div>
                    <div class="state-label">State</div>
                    <div class="state-text">FOUNDATION</div>
                </div>
            </div>

            <div class="form-group">
                <label for="userName">Your Name</label>
                <input type="text" id="userName" placeholder="Enter your name">
            </div>

            <button onclick="createUser()">Enter the Castle</button>
        </div>

        <!-- PHASE 2: ORDER -->
        <div id="phase-order" class="phase hidden">
            <div class="state">
                <div>
                    <div class="state-label">You are here</div>
                    <div class="state-text">What should change in this place?</div>
                </div>
            </div>

            <div class="form-group">
                <label for="orderText">Your Order</label>
                <textarea id="orderText" placeholder="Describe the change you wish to see..."></textarea>
            </div>

            <button onclick="issueOrder()">Issue Order</button>
        </div>

        <!-- PHASE 3: SEAL -->
        <div id="phase-seal" class="phase hidden">
            <div class="state">
                <div>
                    <div class="state-label">Your order awaits</div>
                    <div class="state-text">Will you seal this decision?</div>
                </div>
            </div>

            <button onclick="sealOrder()">Seal It</button>
            <button class="button-secondary" onclick="resetPhase()">Cancel</button>

            <p style="margin-top: 20px; font-size: 12px; color: #8b7355; text-align: center;">
                What is sealed remains.
            </p>
        </div>

        <!-- PHASE 4: SEALED -->
        <div id="phase-sealed" class="phase hidden">
            <div class="state">
                <div>
                    <div class="state-label">State</div>
                    <div class="state-text">SEALED</div>
                </div>
            </div>

            <p style="margin-top: 20px; font-size: 14px; line-height: 1.8; text-align: center; color: #999;">
                The world will continue.<br><br>
                Return in 24 hours.<br><br>
                <span id="userId" style="color: #c9a961; font-weight: bold;"></span>
            </p>

            <button onclick="checkReturn()" style="margin-top: 30px;">Check Status</button>
        </div>

        <!-- PHASE 5: RETURN -->
        <div id="phase-return" class="phase hidden">
            <div class="state">
                <div>
                    <div class="state-label">While you were away</div>
                    <div class="state-text">The world continued.</div>
                </div>
            </div>

            <div id="returnMessage" style="margin-top: 20px; font-size: 14px; line-height: 1.8; color: #c9a961;"></div>

            <div id="ledgerContainer" class="hidden">
                <div style="margin-top: 20px; font-size: 12px; text-transform: uppercase; color: #8b7355;">Ledger</div>
                <div id="ledgerDisplay" class="ledger"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let currentUserId = null;
        let currentUserName = null;

        function showMessage(text, type = "info") {
            const container = document.getElementById("message-container");
            const msg = document.createElement("div");
            msg.className = `message ${type}`;
            msg.textContent = text;
            container.innerHTML = "";
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 5000);
        }

        function showPhase(phaseId) {
            document.querySelectorAll(".phase").forEach(el => el.classList.add("hidden"));
            document.getElementById(phaseId).classList.remove("hidden");
        }

        async function createUser() {
            const name = document.getElementById("userName").value.trim();
            if (!name) {
                showMessage("Enter your name.", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/create_user`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });

                if (!response.ok) throw new Error("Failed to create user");

                const data = await response.json();
                currentUserId = data.user_id;
                currentUserName = name;

                showMessage(`Welcome, ${name}. You stand before the castle.`, "success");
                showPhase("phase-order");
            } catch (error) {
                showMessage("Error entering castle.", "error");
            }
        }

        async function issueOrder() {
            const action = document.getElementById("orderText").value.trim();
            if (!action) {
                showMessage("Describe your order.", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/issue_order/${currentUserId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action })
                });

                if (!response.ok) throw new Error("Failed to issue order");

                showMessage("Order recorded. The world will continue.", "success");
                showPhase("phase-seal");
            } catch (error) {
                showMessage("Error issuing order.", "error");
            }
        }

        async function sealOrder() {
            try {
                const response = await fetch(`${API_BASE}/seal/${currentUserId}`, {
                    method: "POST"
                });

                if (!response.ok) throw new Error("Failed to seal order");

                showMessage("Sealed. What is sealed remains.", "success");
                showPhase("phase-sealed");
                document.getElementById("userId").textContent = `ID: ${currentUserId}`;
            } catch (error) {
                showMessage("Error sealing order.", "error");
            }
        }

        async function checkReturn() {
            try {
                const response = await fetch(`${API_BASE}/return/${currentUserId}`);
                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.message || "Not yet time to return.", "info");
                    return;
                }

                document.getElementById("returnMessage").innerHTML = `
                    <strong>${data.message}</strong><br><br>
                    Your order has taken form in the ledger.
                `;

                if (data.ledger && data.ledger.length > 0) {
                    const ledgerHtml = data.ledger.map(entry => `
                        <div class="ledger-entry">
                            <span class="ledger-action">${entry.action}</span><br>
                            <small>${entry.timestamp}</small>
                        </div>
                    `).join("");
                    document.getElementById("ledgerDisplay").innerHTML = ledgerHtml;
                    document.getElementById("ledgerContainer").classList.remove("hidden");
                }

                showPhase("phase-return");
            } catch (error) {
                showMessage("Error checking return.", "error");
            }
        }

        function resetPhase() {
            document.getElementById("orderText").value = "";
            showPhase("phase-order");
        }
    </script>
</body>
</html>
