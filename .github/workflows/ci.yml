name: CI - Oracle Town Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  doc-index:
    name: Verify CLAUDE.md indices are current
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Regenerate CLAUDE.md indices
        run: python3 scratchpad/generate_claude_index.py

      - name: Check for stale indices
        run: |
          git diff --exit-code scratchpad/CLAUDE_MD_LINE_INDEX.txt scratchpad/CLAUDE_MD_SECTIONS_BY_LENGTH.txt
          if [ $? -ne 0 ]; then
            echo "ERROR: CLAUDE.md indices are stale!"
            echo "Run: python3 scratchpad/generate_claude_index.py"
            echo "Then commit the regenerated files."
            exit 1
          fi

  verify:
    name: Verify governance invariants
    runs-on: ubuntu-latest
    needs: doc-index
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Show repo tree (for debugging)
        run: ls -R | sed -n '1,200p'

      - name: Run CI checks
        run: |
          python3 ci_run_checks.py

  rho-receipt:
    name: K-rho viability receipt lint
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install jsonschema (for schema validation)
        run: pip install jsonschema

      - name: Check for RHO artifacts
        id: rho-check
        run: |
          if [ -f "artifacts/rho_manifest.json" ] && \
             [ -f "artifacts/rho_summary.json" ] && \
             [ -f "artifacts/rho_trace.ndjson" ]; then
            echo "rho_present=true" >> $GITHUB_OUTPUT
          else
            echo "rho_present=false" >> $GITHUB_OUTPUT
            echo "[K-rho] No RHO artifacts found — gate skipped (not yet required)."
          fi

      - name: K-rho receipt lint
        if: steps.rho-check.outputs.rho_present == 'true'
        run: |
          python3 scripts/helen_rho_lint.py \
            artifacts/rho_manifest.json \
            artifacts/rho_summary.json \
            artifacts/rho_trace.ndjson \
            --schema-dir schemas/
